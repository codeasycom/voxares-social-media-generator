<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1080" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        font-family: "Inter", sans-serif;
        background: linear-gradient(
          160deg,
          #0096ff 0%,
          #0070c0 60%,
          #004a80 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px;
        position: relative;
      }
      .logo-icon {
        width: 140px;
        height: 126px;
        margin-bottom: 24px;
      }
      .logo-text {
        font-size: 64px;
        font-weight: 800;
        color: #ffffff;
        letter-spacing: 1px;
        margin-bottom: 20px;
      }
      .tagline {
        font-size: 26px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.85);
        text-align: center;
        max-width: 700px;
        line-height: 1.5;
        margin-bottom: 48px;
      }
      .divider {
        width: 60px;
        height: 3px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 2px;
        margin-bottom: 48px;
      }
      .features {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 16px;
        margin-bottom: 56px;
        max-width: 800px;
      }
      .feature {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 50px;
        padding: 12px 24px;
      }
      .feature svg {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
      }
      .feature span {
        font-size: 17px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.9);
        white-space: nowrap;
      }
      .cta {
        font-size: 20px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.5);
        text-align: center;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
